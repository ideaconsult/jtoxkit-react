---
name: CI

on:  # yamllint disable-line rule:truthy
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:

  check:

    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:

      - name: Checkout repository
        uses: actions/checkout@v7.0.0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.9

      - name: Setup Node.js
        uses: actions/setup-node@v7.0.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check peer dependencies
        run: pnpm peers check

      - name: Run tests
        run: pnpm test

      - name: Build standalone app
        run: pnpm build

      - name: Build library package
        run: pnpm build:lib

      - name: Check library bundle for Vite env leakage
        run: |
          if grep -R -E 'import\.meta\.env|VITE_' dist/*.js; then
            echo "Library bundle must not contain import.meta.env or VITE_ references" >&2
            exit 1
          fi

      - name: Check package contents
        run: pnpm pack --dry-run
