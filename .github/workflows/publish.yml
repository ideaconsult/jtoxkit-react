---
name: Publish to npm

on:  # yamllint disable-line rule:truthy
  release:
    types:
      - published

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:

  publish:

    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: npm
    permissions:
      contents: read
      id-token: write

    steps:

      - name: Checkout release tag
        uses: actions/checkout@v7.0.0
        with:
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.9

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Verify release tag matches package version
        run: |
          version="$(node -p "require('./package.json').version")"
          expected="v${version}"
          actual="${GITHUB_REF_NAME}"

          if [ "${actual}" != "${expected}" ]; then
            echo "Release tag ${actual} does not match package version ${version}; expected ${expected}" >&2
            exit 1
          fi

      - name: Verify release tag is on main
        run: |
          git fetch --no-tags origin main:refs/remotes/origin/main

          if ! git merge-base --is-ancestor HEAD refs/remotes/origin/main; then
            echo "Release tag ${GITHUB_REF_NAME} does not point to a commit reachable from origin/main" >&2
            exit 1
          fi

      - name: Check npm version supports trusted publishing
        run: |
          node --version
          npm --version
          node -e "
            const actual = process.argv[1].split('.').map(Number);
            const minimum = [11, 5, 1];
            const ok = actual[0] > minimum[0]
              || (actual[0] === minimum[0] && actual[1] > minimum[1])
              || (actual[0] === minimum[0] && actual[1] === minimum[1] && actual[2] >= minimum[2]);
            if (!ok) {
              console.error('npm 11.5.1 or newer is required for trusted publishing');
              process.exit(1);
            }
          " "$(npm --version)"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check peer dependencies
        run: pnpm peers check

      - name: Run tests
        run: pnpm test

      - name: Build standalone app
        run: pnpm build

      - name: Build library package
        run: pnpm build:lib

      - name: Check library bundle for Vite env leakage
        run: |
          if grep -R -E 'import\.meta\.env|VITE_' dist/*.js; then
            echo "Library bundle must not contain import.meta.env or VITE_ references" >&2
            exit 1
          fi

      - name: Check package contents
        run: pnpm pack --dry-run

      - name: Publish package
        run: npm publish --access public
